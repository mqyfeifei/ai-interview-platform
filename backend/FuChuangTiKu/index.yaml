meta:
  name: 研发与工程岗位知识库(含后端、前端、CV、网络、QA)
  generated_at: 2026-03-03

targets:
  technical_interview_questions: 30
  project_deep_dive_questions: 10
  scenario_design_questions: 10
  behavioral_questions: 10
  excellent_answer_examples_per_type: "2-3"
  technical_knowledge_points: "unlimited"

datasets:
  # 1. 后端数据源 (Backend)
  - type: technical_interview_questions_backend
    path: data/questions/backend_technical_interview_questions.yaml
    source: ["牛客网", "CSDN"]
  - type: project_deep_dive_questions_backend
    path: data/questions/backend_project_deep_dive_questions.yaml
    source: ["面经库"]
  - type: scenario_design_questions_backend
    path: data/questions/backend_scenario_design_questions.yaml
    source: ["技术博客"]
  - type: behavioral_questions_backend
    path: data/questions/backend_behavioral_questions.yaml
    source: ["面经库"]
  - type: excellent_answer_examples_backend
    path: data/examples/backend_excellent_answers.yaml
    source: ["自己整理"]
  - type: technical_knowledge_points_backend
    path: data/knowledge_points/backend_knowledge_points.yaml
    source: ["官方文档"]
  
  # 2. 前端数据源 (Frontend)
  - type: technical_interview_questions_frontend
    path: data/questions/frontend_technical_interview_questions.yaml
