version: 1
project: FuChuangTiKu
locale: zh-CN
domain: multi-domain-interview # 涵盖后端、前端、CV、网络、QA
maintainer: owner
updated_at: 2026-03-03

storage:
  format: yaml
  root: data
  question_path: data/questions
  examples_path: data/examples
  knowledge_points_path: data/knowledge_points

workflow:
  default_status: draft
  review_states:
    - draft
    - reviewed
    - archived

fields:
  question:
    - id
    - type
    - question
    - tags
    - difficulty
    - source
    - status
  example:
    - id
    - type
    - question
    - answer
    - framework
    - status
  knowledge_point:
    - module_name
    - point
    - complexity
    - estimated_hours
    - resources