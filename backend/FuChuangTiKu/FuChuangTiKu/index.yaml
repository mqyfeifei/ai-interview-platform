meta:
  name: 研发岗位知识库(含Java后端与Web前端)
  generated_at: 2026-03-03

targets:
  technical_interview_questions: 30
  project_deep_dive_questions: 10
  scenario_design_questions: 10
  behavioral_questions: 10
  excellent_answer_examples_per_type: "2-3"
  technical_knowledge_points: "unlimited"

datasets:
  # 后端数据源
  - type: technical_interview_questions_backend
    path: data/questions/technical_interview_questions.yaml
    source: ["牛客网", "CSDN"]
    count: 30
  - type: project_deep_dive_questions_backend
    path: data/questions/project_deep_dive_questions.yaml
    source: ["面经库"]
    count: 10
  - type: scenario_design_questions_backend
    path: data/questions/scenario_design_questions.yaml
    source: ["技术博客"]
    count: 10
  - type: behavioral_questions_backend
    path: data/questions/behavioral_questions.yaml
    source: ["面经库"]
    count: 10
  - type: excellent_answer_examples_backend
    path: data/examples/excellent_answers.yaml
    source: ["自己整理"]
    count: "each_type_2_3"
  - type: technical_knowledge_points_backend
    path: data/knowledge_points/java_backend_knowledge_points.yaml
    source: ["官方文档"]
    count: "unlimited"
  
  # 前端数据源
  - type: technical_interview_questions_frontend
    path: data/questions/frontend_technical_questions.yaml
    source: ["牛客网", "掘金"]
    count: 30
  - type: project_deep_dive_questions_frontend
    path: data/questions/frontend_project_questions.yaml
    source: ["面经库"]
    count: 10
  - type: scenario_design_questions_frontend
    path: data/questions/frontend_scenario_questions.yaml
    source: ["技术博客"]
    count: 10
  - type: behavioral_questions_frontend
    path: data/questions/frontend_behavioral_questions.yaml
    source: ["面经库"]
    count: 10
  - type: excellent_answer_examples_frontend
    path: data/examples/frontend_excellent_answers.yaml
    source: ["自己整理"]
    count: "each_type_2_3"
  - type: technical_knowledge_points_frontend
    path: data/knowledge_points/frontend_knowledge_points.yaml
    source: ["MDN", "官方文档"]
    count: "unlimited"
