  - name: Spring 生态
    points:
      - IOC/AOP 原理
      - Spring Boot 自动配置
      - Spring MVC 请求处理链
      - Spring Data 与事务管理
      - Spring Security 鉴权模型
  - name: 数据库与缓存
    points:
      - MySQL 索引与执行计划
      - 事务隔离与 MVCC
      - 分库分表与读写分离
      - Redis 数据结构与持久化
      - 缓存一致性与高可用
  - name: 分布式与微服务
    points:
      - 服务注册发现与配置中心
      - 负载均衡与网关
      - 分布式事务（2PC/TCC/SAGA）
      - 分布式锁与一致性协议
      - 限流、熔断、降级
  - name: 消息队列
    points:
      - Kafka/RabbitMQ 基础模型
      - 消息可靠性与幂等
      - 顺序消费与重试死信
      - 事务消息与最终一致性
  - name: 工程化与质量
    points:
      - 单元测试与集成测试
      - CI/CD 与发布策略
      - 代码规范与静态扫描
      - API 文档与契约测试
  - name: 可观测性与稳定性
    points:
      - 日志规范与链路追踪
      - Metrics 与告警体系
      - SLI/SLO 与容量规划
      - 故障演练与应急预案
