items:
  - id: "QA-EX-T-001"
    type: "technical"
    question: "接口测试中如何处理接口间的依赖关系？"
    framework: "痛点分析-工具选择-实战落地-工程化维护"
    answer: |
      在业务线中，接口强依赖很常见（例如下单接口依赖登录 Token 和商品 ID）。
      第一，如果依赖的是内部已开发接口，我会在自动化测试工具（如 Postman/JMeter 或 Python+Pytest框架）中，利用后置处理器/正则提取器，将上游返回的数据提取并存入全局环境变量，供下游动态调用。
      第二，如果依赖的是外部第三方系统或未开发的接口，我会基于 Mock 技术（如 Mockito 或自建 Mock Server）模拟返回固定契约格式的报文，实现测试解耦。
      最后，在工程化实践中，尽量把数据初始化和清理动作放在 Setup 和 Teardown 中，保障每个测试用例的原子性和独立性。
    status: "draft"
  - id: "QA-EX-P-001"
    type: "project_deep_dive"
    question: "请分享一次你在项目中发现的深层次性能Bug的经历。"
    framework: "STAR"
    answer: |
      S：在我们主导的一次电商订单模块大促前压测中，目标 TPS 是 2000，但压测到 800 时响应时间就开始飙升，且伴随偶发 500 错误。
      T：我需要在一个周末内定位出瓶颈源头，确保大促顺利进行。
      A：我没有单纯丢给开发，而是先观察了监控面板。发现压测期间 CPU 和内存并不高，但 DB 的活跃连接数打满了。随后我利用 Arthas 抓取了业务线程，并配合慢查询日志，发现是一条没走到索引的多表关联查询引发了表锁，同时代码里存在一个未释放连接的死循环隐患。我将火焰图和慢 SQL 报告连同复现脚本提交给了开发。
      R：开发针对性地加了联合索引并修复了连接池泄露。复测后，TPS 稳定达到 2500，保障了大促活动的稳定，我也因此受邀在部门做了性能排障的分享。
    status: "draft"
  - id: "QA-EX-B-001"
    type: "behavioral"
    question: "讲一次你测试通过但上线后引发严重Bug的经历。"
    framework: "STAR + 复盘改进闭环"
    answer: |
      S：在一期购物车改造项目中，上线当晚客服反馈大量用户无法勾选某类促销商品。
      T：作为主测，我立刻配合开发排查，发现是针对特定业务类型的促销规则由于缺少线上真实数据字典配置导致空指针异常。
      A：我首先提供测试时抓包的报文协助开发10分钟内紧急编写修复补丁并打补丁发版止损。随后召开复盘会，我不推脱责任，承认测试环境未能100%覆盖线上全部促销类型的边界场景。
      R：为了闭环，我在下一迭代中引入了线上数据脱敏回放机制，并拉齐产品补充了一份详尽的“大促商品类型矩阵图”，将其加入核心回归测试用例库，此后该模块未再出现类似漏测。
    status: "draft"
  - id: "QA-EX-S-001"
    type: "scenario_design"
    question: "让你测试一个网页的登录功能，你会怎么考虑？"
    framework: "拆解维度 (功能/接口/安全/性能/兼容)"
    answer: |
      我会从不仅限于表单的五个维度展开：
      1. 功能测试：正确的账号密码组合、空值、非法字符、超长边界值、验证码刷新机制与过期机制。
      2. 接口与逻辑测试：连续多次输入错误密码是否触发账号锁定机制、密码在网络传输中是否明文传输、登录成功后Session/Token的有效期及刷新逻辑。
      3. 安全测试：SQL注入（输入 ' OR '1'='1 等）、跨站脚本XSS尝试、暴力破解防护（图形验证码或滑块验证）。
      4. 兼容与易用性：各主流浏览器及版本（Chrome/Edge/Safari）适配，回车键快速登录体验，密码可见/隐藏切换。
      5. 性能测试：高并发下验证码生成接口是否会卡顿，多用户并发登录时的数据库连接池压力测试。
    status: "draft"
  - id: "QA-EX-T-002"
    type: "technical"
    question: "自动化测试总是有“Flaky Tests（随机失败用例）”，你是怎么解决的？"
    framework: "根因分类 - 治理手段 - 持续集成策略"
    answer: |
      随机失败是自动化的毒药，会导致团队对流水线失去信任。
      我通常将根因归为三类：网络抖动、页面加载时序、数据状态污染。
      对策上：1. 针对时序问题，彻底排查并去掉代码中的硬等待（Sleep），全面改用显式等待（Wait Until Condition）。2. 针对数据污染，确保用例执行前动态生成隔离测试数据，或者每次使用后触发 Teardown 强力清洗。3. 针对网络或三方服务抖动，在框架层引入失败自动重试机制（如 Pytest-rerunfailures，设置重试2次）。最后，对于实在无法稳定的用例，会打上标记并移出主回归流水线，专项优化后再合入。
    status: "draft"
  - id: "QA-EX-S-002"
    type: "scenario_design"
    question: "设计一个电商平台的订单支付流程测试方案。"
    framework: "场景拆解 - 维度覆盖 - 风险预案"
    answer: |
      订单支付流程是电商平台的核心链路，我会从以下维度设计测试方案：
      1. 功能测试：正常支付流程、支付失败（如余额不足）、支付超时、用户取消支付等场景。
      2. 接口与并发测试：模拟高并发下多个用户同时抢购同一件限量商品，验证是否存在超卖问题（如库存扣减的原子性）。
      3. 安全测试：尝试抓包篡改支付金额，验证后端是否有签名校验机制；尝试越权领取他人订单的优惠券。
      4. 兼容性测试：不同设备、不同网络环境（如弱网）下的支付体验，确保界面适配和异常提示友好。
      5. 风险预案：针对可能出现的支付系统宕机或第三方支付接口异常，设计降级方案（如提示用户稍后再试）并验证其有效性。
    status: "draft"