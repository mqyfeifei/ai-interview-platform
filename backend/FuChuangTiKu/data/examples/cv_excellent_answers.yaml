items:
  - id: "CV-EX-P-001"
    type: "project_deep_dive"
    question: "请介绍一个你主导的CV落地项目，遇到的最大挑战是什么，你是如何解决的？"
    framework: "STAR + 业务价值"
    answer: |
      S：在工业3C质检项目中，我们需要对手机盖板进行微小划痕和脏污检测。最大挑战是缺陷样本极少（典型的小样本长尾分布），且流水线要求单帧推理延迟必须在 50ms 以内。
      T：我负责从零设计并落地一套高精度、低延迟的缺陷检测算法，业务指标要求漏检率低于0.1%，误检率低于2%。
      A：针对小样本问题，我放弃了重度依赖数据的纯监督目标检测，采用了基于预训练特征提取的无监督异常检测方案（参考 PatchCore 思想）。针对推理速度瓶颈，我将模型 Backbone 替换为轻量级的 MobileNetV3，并利用 TensorRT 进行了 FP16 量化和算子融合加速。此外，针对极少量的复杂缺陷，我利用图像融合与形态学操作生成了高质量的伪缺陷样本进行微调。
      R：最终算法在边缘计算盒上的推理延迟降到了 32ms，漏检率稳定在 0.08%，系统成功上线并替代了产线上的两道人工目检工序，有效降低了人力成本。
    status: "draft"
  - id: "CV-EX-T-001"
    type: "technical"
    question: "在训练目标检测模型时，如果数据集中大目标极多，小目标极少，你会如何优化？"
    framework: "数据端-模型端-损失函数端综合方案"
    answer: |
      针对这种尺度的不平衡，我会从三个维度入手：
      1. 数据端：使用 Copy-Paste 或 Mosaic 数据增强，专门将小目标裁剪并粘贴到图像中丰富小样本数量；或者训练时采用多尺度训练。
      2. 模型端：确保使用了 FPN（特征金字塔），并在浅层高分辨率特征图上增加对小目标的Anchor分配密度；如果使用无锚框模型（如YOLOX），检查正样本匹配策略。
      3. 损失端：针对小目标容易受大目标Loss淹没的问题，可以单独为小目标的预测层赋予更高的Loss权重，或结合 Focal Loss 应对难分小目标的惩罚。
    status: "draft"