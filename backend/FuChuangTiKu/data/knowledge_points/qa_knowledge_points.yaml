type: qa_technical_knowledge_points
source:
  - 官方文档
  - 极客时间
modules:
  - name: 软件测试核心基础
    points:
      - point: 测试理论（白盒测试、黑盒测试、功能测试）
        complexity: Easy
        estimated_hours: 3
        resources:
          - name: 《软件测试的艺术》
            type: 书籍
            url: https://book.douban.com/subject/1445661/(经典书籍)
      - point: 测试层级（单元测试、集成测试、系统测试）
        complexity: Medium
        estimated_hours: 4
        resources:
          - name: Google软件测试之道
            type: 书籍
            url: https://book.douban.com/subject/25742200/(进阶读物)
  - name: 接口与自动化测试
    points:
      - point: 接口测试理论与实践（HTTP协议、Postman、REST Assured）
        complexity: Medium
        estimated_hours: 5
        resources:
          - name: 接口测试实战教程
            type: 视频
            url: https://www.bilibili.com/
      - point: UI自动化测试（Selenium, Playwright, Appium）
        complexity: Hard
        estimated_hours: 6
        resources:
          - name: Playwright 官方文档
            type: 官方文档
            url: https://playwright.dev/
  - name: 性能测试与调优
    points:
      - point: 性能测试基础与指标（并发数、TPS、QPS、响应时间）
        complexity: Hard
        estimated_hours: 5
        resources:
          - name: JMeter 官方文档
            type: 官方文档
            url: https://jmeter.apache.org/
      - point: 服务端性能瓶颈定位
        complexity: Hard
        estimated_hours: 6
        resources:
          - name: 极客时间 - 性能测试实战
            type: 专栏
            url: https://time.geekbang.org/column/intro/100028001
  - name: 持续集成与 DevOps
    points:
      - point: Jenkins / GitLab CI 核心配置与 Pipeline 语法
        complexity: Medium
        estimated_hours: 4
        resources:
          - name: Jenkins Pipeline 官方文档
            type: 官方文档
            url: https://www.jenkins.io/doc/book/pipeline/
          - name: B站 - 自动化测试如何接入 CI/CD 流水线
            type: 视频
            url: https://www.bilibili.com/
      - point: Docker 容器技术与自动化环境编排
        complexity: Medium
        estimated_hours: 4
        resources:
          - name: Docker 官方教程
            type: 官方文档
            url: https://docs.docker.com/get-started/
          - name: 阿里云 - 使用 Docker-compose 部署测试环境
            type: 技术博客
            url: https://developer.aliyun.com/

  - name: 测试环境治理与中间件基础
    points:
      - point: Linux 常用命令与 Shell 脚本基础（排查日志）
        complexity: Easy
        estimated_hours: 3
        resources:
          - name: 鸟哥的 Linux 私房菜
            type: 书籍
            url: https://linux.vbird.org/
      - point: 数据库高级查询与 Redis 缓存数据校验
        complexity: Medium
        estimated_hours: 4
        resources:
          - name: MySQL 必知必会
            type: 书籍
            url: https://book.douban.com/subject/3354490/
          - name: Redis 常用命令快速检索
            type: 官方文档
            url: https://redis.io/commands/

  - name: 安全测试与质量保障体系
    points:
      - point: Web 安全基础（XSS, CSRF, SQL注入及渗透测试工具 BurpSuite 简介）
        complexity: Hard
        estimated_hours: 5
        resources:
          - name: OWASP Top 10 安全风险解析
            type: 官方文档
            url: https://owasp.org/www-project-top-ten/
      - point: 测试左移与右移（代码覆盖率、线上监控与混沌工程探索）
        complexity: Medium
        estimated_hours: 3
        resources:
          - name: 美团技术团队 - 质量保障体系演进
            type: 技术博客
            url: https://tech.meituan.com/
          - name: Netflix Chaos Monkey 官方文档
            type: 官方文档  
            url: https://netflix.github.io/chaosmonkey/
