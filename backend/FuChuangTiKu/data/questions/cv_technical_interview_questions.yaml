items:
  - id: CV-TQ-001
    type: technical
    question: 详细阐述支持向量机（SVM）的核技巧（Kernel Trick）原理，以及在视觉特征分类中常用的核函数。
    tags: [机器学习, SVM, 基础算法]
    difficulty: medium
    source: 牛客网
    status: draft
    key_points:
      - 解释低维线性不可分数据向高维映射的思想
      - 说明核函数在不显式计算高维映射下完成内积运算的数学机制
      - 举例如RBF（径向基核函数）在图像特征（如HOG特征）传统分类器中的应用
  - id: CV-TQ-002
    type: technical
    question: 在解决存在隐变量的图像聚类或分割问题时，期望最大化（EM）算法的工作原理是什么？
    tags: [机器学习, EM算法, 数学推导]
    difficulty: hard
    source: 牛客网
    status: draft
    key_points:
      - E步（Expectation）：基于当前参数估计隐变量的后验概率或期望
      - M步（Maximization）：基于E步求得的隐变量期望，最大化完整数据的对数似然以更新参数
      - 结合具体场景（如高斯混合模型GMM在图像前背景分离中的应用）进行具象化解释
  - id: CV-TQ-003
    type: technical
    question: 目标检测中，Focal Loss 是如何解决正负样本极度不平衡问题的？它的数学公式核心思想是什么？
    tags: [目标检测, 损失函数]
    difficulty: medium
    source: 技术博客
    status: draft
    key_points:
      - 相比标准交叉熵，引入了调制系数 (1 - pt)^γ
      - 降低了大量易分负样本（背景）在Loss中的权重
      - 迫使模型在训练时将注意力集中在那些难分样本（Hard Examples）上
  - id: CV-TQ-004
    type: technical
    question: Vision Transformer (ViT) 中的 Self-Attention 机制与传统 CNN 的感受野有什么本质区别？
    tags: [深度学习, Transformer, 架构对比]
    difficulty: hard
    source: 顶会论文
    status: draft
    key_points:
      - CNN 具备平移不变性和局部性归纳偏置，感受野随深度逐渐扩大
      - ViT 的 Self-Attention 在初始层就具备全局感受野，能捕捉远距离像素的依赖关系
      - 解释缺乏归纳偏置导致 ViT 在小数据集上容易过拟合，依赖大规模预训练
  - id: CV-TQ-005
    type: technical
    question: 详细解释 NMS（非极大值抑制）的原理，以及 Soft-NMS 和 DIoU-NMS 解决了什么痛点？
    tags: [目标检测, 后处理]
    difficulty: medium
    source: 自己整理
    status: draft
    key_points:
      - NMS依赖IoU阈值暴力剔除，导致高度重叠的密集目标（如人群）被误删
      - Soft-NMS采用高斯惩罚函数平滑降低置信度而非直接置零，提升高重叠场景召回率
      - DIoU-NMS在IoU基础上引入中心点距离惩罚，解决框包含情况下的抑制不准问题
  - id: CV-TQ-006
    type: technical
    question: RoI Pooling 和 RoI Align 的本质区别是什么？为什么实例分割必须用 RoI Align？
    tags: [目标检测, 图像分割]
    difficulty: medium
    source: 面经库
    status: draft
    key_points:
      - RoI Pooling 存在两次量化取整（坐标映射取整、池化单元取整），导致空间位置错位
      - RoI Align 取消量化，保留浮点数坐标，利用双线性插值计算池化网格的特征值
      - 实例分割（如 Mask R-CNN）对像素级对齐要求极高，错位会导致掩码边缘严重失真
  - id: CV-TQ-007
    type: technical
    question: 在对比学习（Contrastive Learning）中，MoCo 和 SimCLR 在构建负样本队列上的核心区别是什么？
    tags: [自监督学习, 前沿视觉]
    difficulty: hard
    source: 顶会论文
    status: draft
    key_points:
      - SimCLR 强依赖超大 Batch Size 来提供足够的负样本，对算力要求极高
      - MoCo 引入了动量编码器（Momentum Encoder）和动态字典（Queue），解耦了负样本数量与 Batch Size 的强绑定关系
  - id: CV-TQ-008
    type: technical
    question: 解释 Batch Normalization (BN) 与 Layer Normalization (LN) 的计算维度差异，为何 Transformer 偏向用 LN？
    tags: [深度学习基础, 归一化]
    difficulty: medium
    source: 牛客网
    status: draft
    key_points:
      - BN 跨样本在通道（Channel）维度上求均值方差，受 Batch Size 大小影响大，且难以处理变长序列
      - LN 在单个样本的所有特征维度上归一化，与 Batch Size 无关
      - Transformer 处理NLP或ViT中的变长Token序列，LN 能保证每个Token的表示独立稳定归一化
  - id: CV-TQ-009
    type: technical
    question: 你如何理解计算机视觉中的“域适应”（Domain Adaptation）问题？有哪些常用的解决方法？
    tags: [域适应, 泛化能力]
    difficulty: medium
    source: 自己整理
    status: draft
    key_points:
      - 域适应指模型在训练数据分布（源域）与测试数据分布（目标域）不一致时性能下降的问题
      - 解决方法包括：对抗训练（如DANN）通过引入域分类器和梯度反转层实现特征分布对齐；统计匹配（如MMD）通过最小化源域和目标域特征分布的距离；生成式方法（如CycleGAN）通过图像翻译将源域样本转换为目标域风格 进行训练
  - id: CV-TQ-010     
    type: technical
    question: 你在CV项目中有没有遇到过模型过拟合的情况？你是如何诊断和解决这个问题的？
    tags: [过拟合, 模型诊断]
    difficulty: medium
    source: 自己整理
    status: draft
    key_points:
      - 诊断过拟合的能力：如训练集表现优异但验证集性能较差，或训练过程中验证损失开始上升
      - 解决过拟合的方法：如增加数据量（数据增强、收集更多样本）、引入正则化（L1/L2正则化、Dropout）、简化模型结构（减少参数量）等
      - 是否有量化的效果提升数据支持（如验证集准确率提升了多少，过拟合程度降低了多少）
  - id: CV-TQ-011
    type: technical 
    question: 你在CV项目中有没有遇到过模型欠拟合的情况？你是如何诊断和解决这个问题的？
    tags: [欠拟合, 模型诊断]
    difficulty: medium
    source: 自己整理
    status: draft
    key_points:
      - 诊断欠拟合的能力：如训练集和验证集性能都较差，或训练过程中损失下降缓慢
      - 解决欠拟合的方法：如增加模型复杂度（增加层数或参数量）、减少正则化强度、增加训练轮数等
      - 是否有量化的效果提升数据支持（如验证集准确率提升了多少，欠拟合程度降低了多少）
  - id: CV-TQ-012
    type: technical
    question: 你在CV项目中有没有遇到过模型训练不收敛的情况？你是如何诊断和解决这个问题的？
    tags: [训练不收敛, 模型诊断]
    difficulty: medium
    source: 自己整理
    status: draft
    key_points:
      - 诊断训练不收敛的能力：如训练损失持续震荡或不下降，或验证性能没有提升
      - 解决训练不收敛的方法：如调整学习率（降低过高的学习率）、更换优化器（如从SGD换成Adam）、检查数据质量（如是否有标签错误或异常值）等
      - 是否有量化的效果提升数据支持（如训练损失开始稳定下降，验证集准确率提升了多少）
  - id: CV-TQ-013
    type: technical   
    question: 你在CV项目中有没有遇到过模型训练过程中出现梯度爆炸的情况？你是如何诊断和解决这个问题的？
    tags: [梯度爆炸, 模型诊断]
    difficulty: medium
    source: 自己整理
    status: draft
    key_points:
      - 诊断梯度爆炸的能力：如训练过程中损失突然变为NaN或Inf，或模型权重更新异常大
      - 解决梯度爆炸的方法：如引入梯度裁剪（Gradient Clipping）限制梯度的最大范数、调整网络结构（如使用更稳定的激活函数）、降低学习率等
      - 是否有量化的效果提升数据支持（如训练损失恢复正常下降，验证集准确率提升了多少）
  - id: CV-TQ-014
