items:
  - id: QA-SQ-001
    type: scenario_design
    question: 如果让你对一个微信发红包的功能进行全面测试，你会从哪些维度设计测试点？
    tags: [场景测试, 用例设计]
    difficulty: medium
    source: 技术博客
    status: draft
    key_points:
      - 功能测试：拼手气/普通红包金额计算、最大最小金额/个数限制、退回逻辑
      - 接口/并发测试：多人同时抢同一红包的超卖问题（并发锁验证）、幂等性
      - 兼容与UI：不同机型屏幕适配、弱网环境断线重连体验
      - 安全测试：抓包篡改金额、越权领取
  - id: QA-SQ-002
    type: scenario_design
    question: 大促秒杀场景即将上线，请你设计一个全链路压测的方案。
    tags: [性能测试, 全链路压测]
    difficulty: hard
    source: 技术博客
    status: draft
    key_points:
      - 流量评估：与业务核对预期峰值，构建压测数据模型
      - 数据隔离：压测标记透传，影子表与影子库建立，防止污染线上真实数据
      - 演练执行：阶梯式加压探测极限，演练限流、熔断及降级预案是否生效
      - 结果分析：监控系统资源利用率、响应时间分布，定位性能瓶颈并推动优化
  - id: QA-SQ-003
    type: scenario_design
    question: 设计一个第三方支付（如支付宝/微信支付）接入模块的测试方案，如何保证资金安全与订单状态一致性？
    tags: [业务场景, 支付测试]
    difficulty: hard
    source: 技术博客
    status: draft
    key_points:
      - 状态流转验证：正向支付成功回调、用户取消支付、支付超时未支付
      - 异常断网与重试：支付过程中断网、第三方异步回调延迟或失败、应用端主动发起查单补偿机制验证
      - 资金安全与并发：支付金额防篡改（签名校验）、超付退款逻辑、高并发下防重复支付（幂等性）
  - id: QA-SQ-004
    type: scenario_design
    question: 设计针对一款短视频流媒体 App 的专项测试方案。
    tags: [客户端测试, 专项测试]
    difficulty: medium
    source: 技术博客
    status: draft
    key_points:
      - 弱网测试：利用 Charles/QNET 模拟 3G/2G、高丢包、高延迟网络下的首屏加载、卡顿率及断点续传表现
      - 耗电量与内存：长时间播放下的 CPU 占用、内存泄漏（OOM）、机身发热与耗电量监控（PerfDog）
      - 兼容性测试：覆盖不同分辨率、不同系统版本（iOS/Android）、刘海屏/折叠屏适配、以及音视频解码器的兼容
  - id: QA-SQ-005
    type: scenario_design
    question: 如果让你负责测试一个接入了大语言模型（LLM）的智能客服对话框，你会从哪些维度开展？
    tags: [AI测试, 前沿场景]
    difficulty: hard
    source: 自己整理
    status: draft
    key_points:
      - 基础交互：长文本输入限制、Markdown富文本渲染、多轮对话的上下文记忆能力
      - 鲁棒性与安全（红蓝对抗）：提示词注入攻击（Prompt Injection）、涉黄涉政暴恐等敏感词拦截监控
      - 准确性评估：构建涵盖业务知识库的 Ground Truth 评测集，验证幻觉率（Hallucination）和回答准确率
      - 性能与可用性：响应时间监控、并发对话压力测试、以及模型升级迭代后的回归验证
  - id: QA-SQ-006
    type: scenario_design
    question: 设计一个电商平台的订单系统测试方案，如何覆盖订单全生命周期的关键场景？
    tags: [订单系统, 场景测试]
    difficulty: medium
    source: 技术博客
    status: draft
    key_points:
      - 订单创建：正常下单、库存不足、优惠券使用、地址验证等场景
      - 订单支付：支付成功、支付失败、支付超时、用户取消支付等场景
      - 订单履约：发货流程、物流跟踪、退换货流程等场景
      - 订单关闭：用户主动取消、系统自动关闭（如超时未支付）、售后服务等场景
  - id: QA-SQ-007
    type: scenario_design
    question: 设计一个在线教育平台的直播课程系统测试方案，如何保证直播质量与用户体验？
    tags: [直播系统, 场景测试]
    difficulty: medium
    source: 技术博客
    status: draft
    key_points:
      - 直播稳定性：弱网环境下的流畅度、断线重连机制、以及直播过程中切换网络的表现
      - 互动功能：弹幕发送与展示、举手发言、以及师生互动的实时性和可靠性
      - 兼容性测试：不同设备（PC/移动端）、不同操作系统（Windows/iOS/Android）的适配情况
      - 安全与隐私：直播内容的敏感词过滤、用户隐私信息保护，以及防止恶意攻击（如DDOS）对直播的影响
  - id: QA-SQ-008
    type: scenario_design
    question: 设计一个基于云原生架构的微服务系统的测试方案，如何覆盖服务间调用、容器编排和弹性伸缩等场景？
    tags: [云原生, 微服务, 场景测试]
    difficulty: hard
    source: 技术博客
    status: draft
    key_points:
      - 服务间调用：模拟高并发请求验证服务发现、负载均衡和熔断机制的有效性
      - 容器编排：验证Kubernetes等编排平台的部署、滚动更新和回滚功能是否正常工作
      - 弹性伸缩：通过压力测试触发自动伸缩，验证系统在资源扩展和收缩过程中的稳定性和性能表现
      - 监控与日志：确保分布式追踪、日志聚合和监控系统能够正确捕获和分析微服务的运行状态和异常情况
  - id: QA-SQ-009
    type: scenario_design
    question: 设计一个社交媒体平台的内容审核系统测试方案，如何覆盖敏感内容识别、用户举报处理和审核效率等场景？
    tags: [内容审核, 场景测试]
    difficulty: medium
    source: 技术博客
    status: draft
    key_points:
      - 敏感内容识别：构建包含涉黄、涉政、暴恐等敏感内容的测试集，验证自动审核模型的准确率和召回率
      - 用户举报处理：模拟用户举报流程，验证举报信息的传递、处理时效和结果反馈机制
      - 审核效率：通过压力测试评估审核系统在高并发情况下的处理能力和响应时间，确保用户体验不受影响
      - 误判与漏判：设计边界测试用例验证审核系统的鲁棒性，确保误判率和漏判率在可接受范围内
  - id: QA-SQ-010   
    type: scenario_design
    question: 设计一个基于计算机视觉的智能垃圾分类系统，如何处理垃圾种类繁多且外观相似的挑战？
    tags: [垃圾分类, 细粒度识别]
    difficulty: medium
    source: 自己整理
    status: draft
    key_points:
      - 细粒度分类：引入注意力机制（如SE模块）聚焦于区分性特征，提升相似类别的辨识度
      - 多模态融合：结合重量传感器等非视觉信息辅助分类决策
      - 数据增强与迁移学习：利用GAN生成稀缺类别样本，或从相关领域（如食品识别）迁移预训练模型提升泛化能力
      