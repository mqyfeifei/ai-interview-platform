items:
  - id: NW-TQ-001
    type: technical
    question: 详细阐述 TCP 三次握手与四次挥手的过程。为什么挥手需要四次？操作系统中大量出现 TIME_WAIT 状态怎么处理？
    tags: [网络基础, TCP/IP, OS底层]
    difficulty: medium
    source: 牛客网
    status: draft
    key_points:
      - 握手建立双向序列号同步，挥手因 TCP 全双工特性需分别关闭发送和接收通道
      - TIME_WAIT 的两大作用：保证最后 ACK 到达、防止旧连接报文混入新连接（2MSL机制）
      - OS层面优化：调整内核参数如 tcp_tw_reuse，开启 syncookies 防御半连接攻击，优化应用程序连接池
  - id: NW-TQ-002
    type: technical
    question: OSPF 和 BGP 的本质区别是什么？在大型网络架构中应该如何组合使用？
    tags: [路由协议, 架构选型]
    difficulty: medium
    source: 经典教材
    status: draft
    key_points:
      - OSPF 是 IGP（内部网关协议），基于链路状态算法，重在发现拓扑、快速收敛；BGP 是 EGP（外部网关协议），基于路径矢量，重在路由策略控制与大规模路由承载
      - 组合应用：OSPF 作为底层 Underlay 打通环回口 IP 的连通性，BGP 承载海量业务网段或 VPNv4 路由进行灵活选路
  - id: NW-TQ-003
    type: technical
    question: 简述 ARP 协议的工作原理，以及什么是 Proxy ARP 和免费 ARP (Gratuitous ARP)？
    tags: [网络基础, 二层协议]
    difficulty: easy
    source: 牛客网
    status: draft
    key_points:
      - ARP 通过广播请求、单播应答实现 IP 到 MAC 的地址映射
      - 免费 ARP：设备主动发送宣告自己的 IP-MAC 映射，常用于 IP 冲突检测或 HA 故障切换时的网关 MAC 刷新
      - Proxy ARP：路由器代替目的主机回应 ARP 请求，使不在同物理网段但子网配置错误的主机能够跨路由通信
  - id: NW-TQ-004
    type: technical
    question: 深入理解 STP（生成树协议），RSTP 相比传统 STP 做了哪些优化实现了快速收敛？
    tags: [交换技术, 防环机制]
    difficulty: hard
    source: 经典教材
    status: draft
    key_points:
      - 传统 STP 依赖定时器（Max Age/Forward Delay）导致拓扑收敛极慢（30s-50s）
      - RSTP 引入了 P/A（Proposal/Agreement）握手协商机制，实现极速端口状态切换
      - 增加 Alternate 端口（根端口备份）和 Backup 端口（指定端口备份），边缘端口（Edge Port）机制避免接入终端引起拓扑震荡
  - id: NW-TQ-005
    type: technical
    question: 解释 IPsec VPN 中的 IKE 阶段一与阶段二分别承担什么任务？
    tags: [网络安全, VPN]
    difficulty: medium
    source: 牛客网
    status: draft
    key_points:
      - 阶段一（Main/Aggressive Mode）：建立 ISAKMP SA，完成对等体身份双向认证，并通过 DH 算法安全交换密钥素材，构建一个安全的保护隧道
      - 阶段二（Quick Mode）：在阶段一的安全隧道内协商 IPsec SA 参数（如加密算法 AES、认证算法 SHA），定义要保护的感兴趣数据流
  - id: NW-TQ-006
    type: technical
    question: Ping 和 Traceroute 的底层实现原理是什么？
    tags: [网络基础, 故障排查]
    difficulty: easy
    source: 经典教材
    status: draft
    key_points:
      - Ping 发送 ICMP Echo Request 并等待 Echo Reply 计算时延与连通性
      - Traceroute（Windows的tracert）通过递增 IP 报文的 TTL 值，促使沿途路由器返回 ICMP Time Exceeded 报文，从而描绘出完整的数据包转发跳数路径
  - id: NW-TQ-007
    type: technical
    question: 什么是 BGP 路由黑洞问题？有哪些常用的解决方案？
    tags: [BGP, 疑难排障]
    difficulty: hard
    source: 经典教材
    status: draft
    key_points:
      - 产生原因：BGP 路由已跨越非 BGP 路由器传递，导致中间路由器收到数据包时查无匹配路由直接丢弃
      - 传统方案：路由重分发（将 BGP 引入 OSPF，有极大的路由表膨胀风险）或 BGP 全连接（Full Mesh）
      - 现代最佳实践：引入 MPLS LDP 构建标签交换隧道，数据包通过标签栈跨越中间设备（无需查找 IP 路由表）
  - id: NW-TQ-008
    type: technical
    question: 描述一个数据包从 PC（局域网）发送到外网服务器，最终收到响应的完整生命周期（涉及 DNS、ARP、NAT、路由寻址）。
    tags: [综合题, 数据流向]
    difficulty: hard
    source: 自己整理
    status: draft
    key_points:
      - DNS 解析：检查本地/OS缓存，无缓存则向 DNS 服务器发 UDP 请求获取服务器 IP
      - 封装与 ARP：判断目的 IP 非同网段，查找默认网关 MAC 封装二层帧（缺网关 MAC 时发 ARP 请求）
      - 路由转发：网关解封装二层，查路由表选路，途经 NAT 网关替换源 IP/端口记录会话映射
      - TCP通信：三次握手建立后传输数据，回程包经 NAT 解码转换回局域网 IP，最终由网关投递至 PC
  - id: NW-TQ-009
    type: technical
    question: 你在网络项目中有没有遇到过“技术债务”？你是如何识别和管理它的？
    tags: [技术债务, 项目管理]
    difficulty: hard
    source: 自己整理
    status: draft
    key_points:
      - 技术债务识别：通过代码审查、配置检查和性能监控发现过时的协议版本（如 SSLv3）、不合理的路由策略或过度复杂的网络拓扑
      - 管理策略：建立技术债务登记和优先级评估机制，将清理技术债务纳入常规迭代计划，确保资源分配和团队意识
      - 长远规划：结合网络架构演进路线图，逐步淘汰陈旧技术，引入自动化工具提升维护效率，避免技术债务积累成不可控风险
  - id: NW-TQ-010
    type: technical
    question: 你在网络项目中有没有遇到过“技术孤岛”？你是如何打破它的？
    tags: [技术孤岛, 跨部门协作]
    difficulty: hard
    source: 自己整理
    status: draft
    key_points:
      - 技术孤岛识别：通过沟通和调研发现某些网络设备或系统缺乏文档、监控和自动化支持，成为维护难点和风险点
      - 打破策略：推动跨部门合作，建立共享文档库和监控平台，逐步引入自动化工具覆盖孤岛系统
      - 成功案例：通过引入 Ansible 自动化配置管理，将原本手工维护的核心交换机纳入统一管理体系，提升了配置一致性和故障响应速度
  - id: NW-TQ-011
    type: technical
    question: 你在网络项目中有没有遇到过“技术迷茫期”？你是如何走出它的？
    tags: [技术迷茫, 自我驱动]
    difficulty: hard
